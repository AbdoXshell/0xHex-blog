baseURL = "https://0xhex.netlify.app/"
languageCode = "en-us"
title = "0xHex"
theme = "PaperMod"
paginate = 10
enableRobotsTXT = true
buildDrafts = false

[minify]
  disableXML = true
  minifyOutput = true

[params]
  env = "production"
  author = "0xHex"
  description = "Penetration testing write-ups covering HackTheBox, TryHackMe, and CTF competitions."
  defaultTheme = "dark"
  disableThemeToggle = false
  ShowReadingTime = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  showtoc = true
  tocopen = false

  [params.homeInfoParams]
    Title = "$ whoami"
    Content = """
Offensive security write-ups and technical notes.
Machines, challenges, and CTFs — documented with full methodology.
HackTheBox · TryHackMe · CTF Competitions
"""

  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/AbdoXshell"

[taxonomies]
  category = "categories"
  tag = "tags"

[menu]
  [[menu.main]]
    identifier = "writeups"
    name = "Write-ups"
    url = "/posts/"
    weight = 10

  [[menu.main]]
    identifier = "tags"
    name = "Tags"
    url = "/tags/"
    weight = 20

  [[menu.main]]
    identifier = "search"
    name = "Search"
    url = "/search/"
    weight = 30

  [[menu.main]]
    identifier = "about"
    name = "About"
    url = "/about/"
    weight = 40

[markup]
  [markup.highlight]
    codeFences = true
    guessSyntax = true
    lineNos = true
    style = "monokai"

  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

[outputs]
  home = ["HTML", "RSS", "JSON"]
